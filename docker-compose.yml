services:
  redis: 
    image: redis:7-alpine
    ports: 
      - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=devuser
      - POSTGRES_PASSWORD=dev_pass
      - POSTGRES_DB=ai_garment_generator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./static:/app/static

  celery-worker:
    build: .
    env_file:
      - .env
    command: celery -A tasks.celery_app worker --loglevel=info -P solo
    depends_on:
      - redis
    volumes:
      - ./static:/app/static

  gui:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    command: python -m ui.gui
    depends_on:
      - api

volumes:
  postgres_data: